# Netlify 部署設定 — 把 public/ 當作網站根目錄（直接服務多頁靜態站）
[build]
  publish = "public"
  command = ""

# 永遠拿最新的 html/js/css（避免瀏覽器拿到舊版造成「連線錯誤」或舊字級/樣式殘留）
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache"
